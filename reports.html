<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Reports - GMDC Pharmacy</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="dashboard">
        <!-- Mobile Header -->
        <div class="mobile-header">
            <button class="burger-btn" id="burgerBtn">
                <i class="fas fa-bars"></i>
            </button>
            <div class="mobile-logo">
                <h2>GMDC BOTICA</h2>
            </div>
            <div class="mobile-notification">
                <i class="fas fa-bell"></i>
                <span class="badge">3</span>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>GMDC BOTICA</h2>
                <p>Inventory System</p>
            </div>
            <div class="user-profile-sidebar">
                <div class="user-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="user-info-sidebar">
                    <div id="sidebarUserName">Loading...</div>
                    <div id="sidebarUserEmail">Loading...</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i> <span>Dashboard</span>
                </a>
                <a href="inventory.html" class="nav-item">
                    <i class="fas fa-pills"></i> <span>Inventory</span>
                </a>
                <a href="pos.html" class="nav-item">
                    <i class="fas fa-cash-register"></i> <span>Point of Sale</span>
                </a>
                <a href="sales.html" class="nav-item">
                    <i class="fas fa-chart-line"></i> <span>Sales History</span>
                </a>
                <a href="reports.html" class="nav-item active">
                    <i class="fas fa-file-alt"></i> <span>Reports</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Desktop Top Bar -->
            <div class="desktop-top-bar">
                <div class="top-bar-left">
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search products...">
                    </div>
                </div>
                <div class="top-bar-actions">
                    <div class="notification">
                        <i class="fas fa-bell"></i>
                        <span class="badge">3</span>
                    </div>
                    <div class="date-time">
                        <span id="currentDateTime"></span>
                    </div>
                </div>
            </div>

            <!-- Mobile Search Bar -->
            <div class="mobile-search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search products...">
            </div>

            <!-- Welcome Message -->
            <div class="welcome-message">
                <h2>Welcome back, <span id="welcomeUserName">User</span>!</h2>
                <p>Here's what's happening with your pharmacy today.</p>
            </div>

            <!-- Reports Content -->
            <div id="reports-tab" class="tab-content active">
                <h1 class="page-title">Sales Reports</h1>
                
                <!-- Report Controls -->
                <div class="reports-header">
                    <div class="report-controls">
                        <div class="month-year-selector">
                            <select id="reportMonth" class="month-select">
                                <option value="0">January</option>
                                <option value="1">February</option>
                                <option value="2">March</option>
                                <option value="3">April</option>
                                <option value="4">May</option>
                                <option value="5">June</option>
                                <option value="6">July</option>
                                <option value="7">August</option>
                                <option value="8">September</option>
                                <option value="9">October</option>
                                <option value="10">November</option>
                                <option value="11">December</option>
                            </select>
                            <select id="reportYear" class="year-select"></select>
                        </div>
                        <div class="report-type-selector">
                            <select id="reportPeriod" class="report-period-select">
                                <option value="daily">Daily</option>
                                <option value="weekly">Weekly</option>
                                <option value="monthly">Monthly</option>
                            </select>
                        </div>
                        <button class="btn-primary" id="generateReportBtn">
                            <i class="fas fa-chart-bar"></i> Generate Report
                        </button>
                        <button class="btn-secondary" id="downloadReportPDFBtn">
                            <i class="fas fa-file-pdf"></i> Download PDF
                        </button>
                    </div>
                </div>

                <!-- Report Container -->
                <div class="report-container">
                    <!-- Chart Section -->
                    <div class="report-chart-container">
                        <canvas id="reportChart"></canvas>
                    </div>
                    
                    <!-- Stats Section -->
                    <div class="report-stats" id="reportStats"></div>
                    
                    <!-- Fast Moving Products Section -->
                    <div class="fast-moving-products" id="fastMovingProducts">
                        <div class="loading">Analyzing fast moving products...</div>
                    </div>
                    
                    <!-- Product Sales Breakdown Section -->
                    <div class="product-sales-breakdown" id="productSalesBreakdown">
                        <div class="loading">Loading product sales data...</div>
                    </div>
                    
                    <!-- Report Summary -->
                    <div class="report-summary" id="reportSummary"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/reports.js"></script>
</body>
</html>
