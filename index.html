<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>GMDC Pharmacy - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="container">
        <h2 class="form-title">GMDC BOTICA</h2>
        <p style="text-align: center; color: #11698c; margin-bottom: 20px;">Pharmacy Management System</p>
        
        <div id="message" class="messageDiv" style="display: none;"></div>
        
        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="recover">
                <a href="#">Forgot Password?</a>
            </div>
            <button type="submit" id="loginBtn">Sign In</button>
        </form>
        
        <div class="or">OR</div>
        
        <div class="icons">
            <i class="fab fa-google"></i>
            <i class="fab fa-facebook-f"></i>
            <i class="fab fa-apple"></i>
        </div>
        
        <div class="links">
            <p>Don't have an account?</p>
            <a href="signup.html" id="signUpButton">Sign Up</a>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
